---
# RevTown API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: revtown-api
  namespace: revtown-core
  labels:
    app.kubernetes.io/name: revtown
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: revtown
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: revtown
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: revtown-api
      containers:
        - name: api
          image: revtown/api:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: revtown-config
            - secretRef:
                name: revtown-secrets
          env:
            - name: REVTOWN_MODE
              value: "saas"
            - name: REVTOWN_ENV
              value: "production"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: revtown-api
  namespace: revtown-core
  labels:
    app.kubernetes.io/name: revtown
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: revtown
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: revtown-api
  namespace: revtown-core
  labels:
    app.kubernetes.io/name: revtown
    app.kubernetes.io/component: api
