---
# Polecat Job Template
# Polecats run as ephemeral Kubernetes Jobs
# This is a template - actual jobs are created dynamically by the Polecat Runner

apiVersion: batch/v1
kind: Job
metadata:
  name: polecat-${EXECUTION_ID}
  namespace: revtown-${RIG}
  labels:
    app.kubernetes.io/name: revtown
    app.kubernetes.io/component: polecat
    revtown.io/rig: ${RIG}
    revtown.io/polecat-type: ${POLECAT_TYPE}
    revtown.io/execution-id: ${EXECUTION_ID}
spec:
  ttlSecondsAfterFinished: 3600  # Clean up after 1 hour
  backoffLimit: 3
  activeDeadlineSeconds: 600  # 10 minute timeout
  template:
    metadata:
      labels:
        app.kubernetes.io/name: revtown
        app.kubernetes.io/component: polecat
        revtown.io/rig: ${RIG}
    spec:
      serviceAccountName: revtown-polecat
      restartPolicy: Never
      containers:
        - name: polecat
          image: revtown/polecat-runner:latest
          env:
            - name: POLECAT_TYPE
              value: "${POLECAT_TYPE}"
            - name: RIG
              value: "${RIG}"
            - name: BEAD_ID
              value: "${BEAD_ID}"
            - name: EXECUTION_ID
              value: "${EXECUTION_ID}"
            - name: ORGANIZATION_ID
              value: "${ORGANIZATION_ID}"
          envFrom:
            - configMapRef:
                name: revtown-config
            - secretRef:
                name: revtown-polecat-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
# Polecat Service Account (per namespace)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: revtown-polecat
  # namespace: revtown-${RIG}  # Applied per rig
  labels:
    app.kubernetes.io/name: revtown
    app.kubernetes.io/component: polecat
