---
# RevTown ConfigMap (Non-sensitive configuration)
apiVersion: v1
kind: ConfigMap
metadata:
  name: revtown-config
  namespace: revtown-core
  labels:
    app.kubernetes.io/name: revtown
data:
  REVTOWN_MODE: "saas"
  REVTOWN_ENV: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"

  # Database
  DOLT_HOST: "dolt.revtown-core.svc.cluster.local"
  DOLT_PORT: "3306"
  DOLT_DATABASE: "revtown"

  # Kafka
  KAFKA_BOOTSTRAP_SERVERS: "kafka.revtown-core.svc.cluster.local:9092"
  KAFKA_CONSUMER_GROUP: "revtown-api"

  # Temporal
  TEMPORAL_HOST: "temporal.revtown-core.svc.cluster.local:7233"
  TEMPORAL_NAMESPACE: "revtown"
  TEMPORAL_TASK_QUEUE: "revtown-polecats"

  # API
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_BASE_URL: "https://api.revtown.io"

  # Vault
  VAULT_ADDR: "http://vault.revtown-core.svc.cluster.local:8200"
  VAULT_MOUNT_PATH: "secret"
  VAULT_PATH_PREFIX: "revtown"

  # Neurometric
  NEUROMETRIC_API_URL: "https://api.neurometric.ai"

  # Rate Limiting
  RATE_LIMIT_REQUESTS_PER_MINUTE: "60"
  RATE_LIMIT_BURST: "100"
