---
# RevTown Secrets Template
# NEVER commit actual secrets to version control
# This is an example - actual secrets should be created via kubectl or a secrets manager

apiVersion: v1
kind: Secret
metadata:
  name: revtown-secrets
  namespace: revtown-core
  labels:
    app.kubernetes.io/name: revtown
type: Opaque
stringData:
  # Database
  DOLT_USER: "revtown"
  DOLT_PASSWORD: "CHANGE_ME"

  # JWT
  JWT_SECRET_KEY: "CHANGE_ME_TO_LONG_RANDOM_STRING"

  # Vault
  VAULT_TOKEN: "CHANGE_ME"

  # Neurometric
  NEUROMETRIC_API_KEY: "CHANGE_ME"

  # Stripe (SaaS mode)
  STRIPE_SECRET_KEY: "sk_live_CHANGE_ME"
  STRIPE_WEBHOOK_SECRET: "whsec_CHANGE_ME"
---
# Polecat-specific secrets (per rig)
apiVersion: v1
kind: Secret
metadata:
  name: revtown-polecat-secrets
  # namespace: revtown-${RIG}
  labels:
    app.kubernetes.io/name: revtown
type: Opaque
stringData:
  # These are injected from Vault at runtime
  # This secret contains the Vault token for credential retrieval
  VAULT_TOKEN: "CHANGE_ME"
