name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with dev

      - name: Run ruff
        run: poetry run ruff check .

      - name: Run ruff format check
        run: poetry run ruff format --check .

      - name: Run mypy
        run: poetry run mypy apps/api polecats rigs

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint-python]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with dev

      - name: Run unit tests
        run: poetry run pytest tests/unit -v --cov=apps/api --cov=polecats --cov=rigs --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-unit]
    services:
      dolt:
        image: dolthub/dolt-sql-server:latest
        ports:
          - 3306:3306
        env:
          DOLT_ROOT_PASSWORD: testpassword

      redpanda:
        image: redpandadata/redpanda:latest
        ports:
          - 9092:9092
        options: >-
          --health-cmd "rpk cluster health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with dev

      - name: Wait for services
        run: |
          sleep 10

      - name: Run integration tests
        env:
          DOLT_HOST: localhost
          DOLT_PORT: 3306
          DOLT_USER: root
          DOLT_PASSWORD: testpassword
          DOLT_DATABASE: revtown_test
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          REVTOWN_MODE: self-hosted
          JWT_SECRET_KEY: test-secret-key
        run: poetry run pytest tests/integration -v

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test-integration]
    services:
      dolt:
        image: dolthub/dolt-sql-server:latest
        ports:
          - 3306:3306
        env:
          DOLT_ROOT_PASSWORD: testpassword

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with dev

      - name: Run E2E tests
        env:
          DOLT_HOST: localhost
          DOLT_PORT: 3306
          DOLT_USER: root
          DOLT_PASSWORD: testpassword
          DOLT_DATABASE: revtown_test
          REVTOWN_MODE: self-hosted
          JWT_SECRET_KEY: test-secret-key
          NEUROMETRIC_API_KEY: test-key
          NEUROMETRIC_API_URL: http://localhost:8001
        run: poetry run pytest tests/e2e -v

  build-api:
    name: Build API Docker Image
    runs-on: ubuntu-latest
    needs: [test-unit]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: revtown/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build Web Docker Image
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: false
          tags: revtown/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Run Bandit security linter
        run: |
          pip install bandit
          bandit -r apps/api polecats rigs -ll
